kind = "web"
previewPath = "/"
title = "SparqForge"
version = "1.0.0"
id = "artifacts/sparqforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19060

[services.development]
run = "pnpm --filter @workspace/sparqforge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sparqforge", "run", "build" ]
publicDir = "artifacts/sparqforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19060"
BASE_PATH = "/"
